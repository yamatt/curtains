<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Curtain Animations</title>
    <style>
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: 0 auto;
        padding: 10px;
        background-color: #111;
        color: #eee;
      }

      h1 {
        text-align: center;
        color: #eee;
        margin: 8px 0;
        font-size: 22px;
      }

      .nav-link {
        display: block;
        text-align: center;
        color: #66aaff;
        text-decoration: none;
        margin: 6px 0;
        font-size: 14px;
      }

      .nav-link:hover {
        text-decoration: underline;
      }

      fieldset {
        margin-bottom: 12px;
        border: 1px solid #444;
        border-radius: 5px;
        padding: 12px;
        background-color: #1a1a1a;
      }

      legend {
        font-weight: bold;
        color: #aaa;
        padding: 0 8px;
      }

      input[type="text"] {
        padding: 8px;
        margin: 4px 0;
        border: 1px solid #555;
        border-radius: 4px;
        width: 100%;
        background-color: #2a2a2a;
        color: #eee;
        font-size: 14px;
      }

      label {
        display: block;
        margin: 4px 0;
        font-size: 13px;
        color: #aaa;
      }

      button {
        padding: 10px 16px;
        margin: 4px;
        border: none;
        border-radius: 4px;
        background-color: #007bff;
        color: white;
        cursor: pointer;
        font-size: 14px;
      }

      button:hover {
        background-color: #0056b3;
      }

      button:active {
        background-color: #004085;
      }

      button:disabled {
        background-color: #444;
        color: #777;
        cursor: not-allowed;
      }

      .button-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 8px;
      }

      .button-row button {
        flex: 1;
      }

      .status {
        padding: 8px 12px;
        margin: 8px 0;
        border: 1px solid #555;
        border-radius: 4px;
        background-color: #1a1a2e;
        text-align: center;
        font-size: 13px;
      }

      .status.info    { color: #66aaff; border-color: #224488; background-color: #112244; }
      .status.success { color: #44cc44; border-color: #226622; background-color: #112211; }
      .status.error   { color: #ff4444; border-color: #882222; background-color: #221111; }

      #preview-container {
        position: relative;
        width: 100%;
        max-width: 320px;
        margin: 8px auto;
        background-color: #000;
        border: 2px solid #333;
        border-radius: 4px;
        aspect-ratio: 1;
      }

      #preview-canvas {
        display: block;
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      .animation-desc {
        font-size: 12px;
        color: #777;
        margin: 2px 4px 8px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <h1>✨ Curtain Animations</h1>

    <a href="index.html" class="nav-link">← Back to Controls</a>

    <div id="status" class="status info">Connect to your curtain device, then select an animation.</div>

    <!-- Device connection -->
    <fieldset>
      <legend>📱 Device Connection</legend>
      <label for="device-name">Device Name Prefix (optional):</label>
      <input type="text" id="device-name" value="Hello Fairy" placeholder="Hello Fairy" />
      <label for="char-uuid">Characteristic UUID:</label>
      <input type="text" id="char-uuid" value="49535343-8841-43f4-a8d4-ecbe34729bb3" />
      <div class="button-row">
        <button id="connect-btn">Connect</button>
        <button id="disconnect-btn">Disconnect</button>
      </div>
    </fieldset>

    <!-- Preview of the curtain display -->
    <div id="preview-container">
      <canvas id="preview-canvas" width="20" height="20"></canvas>
    </div>

    <!-- Animation controls -->
    <fieldset>
      <legend>🎬 Animations</legend>

      <div class="button-row">
        <button id="btn-emergency">🚨 Emergency</button>
        <button id="btn-rainbow">🌈 Rainbow</button>
      </div>
      <div class="button-row">
        <button id="btn-matrix">💻 Matrix</button>
      </div>
      <div class="button-row">
        <button id="btn-fire-normal">🔥 Fire (Normal)</button>
        <button id="btn-fire-blue">🔵 Fire (Blue)</button>
      </div>

      <div class="button-row">
        <button id="stop-btn" disabled>⏹ Stop</button>
      </div>
    </fieldset>
  </body>
</html>
